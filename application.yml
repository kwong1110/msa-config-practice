server:
  port: 8080

eureka:
  client:
    enabled: false

spring:
  rabbitmq:
    host: rabbitmq-service
    port: 5672
    username: guest
    password: guest

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST}:3306/inspire
    username: ${DB_ADMIN}
    password: ${DB_PASSWORD}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: create
    show-sql: true

  data:
    redis:
      host: redis-service
      port: 6379
      password:
      timeout: 6000ms

  cloud:
    bus:
      enabled: true
