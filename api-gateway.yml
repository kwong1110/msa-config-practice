server:
  port: 8888

spring:
  cloud:
    gateway:
      # NOTE cors 처리
      # 각 서비스 모듈은 웹브라우저와 직접 통신하지 않으므로 단일진입점인 gateway 담당
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders: "*"
            allowCredentials: true

      # NOTE eureka server에 등록된 client 찾아서 사용자의 url_pattern을 매핑하는 작업
      routes:
        - id: user-service
          predicates:
            - Path=/user-service/**
          filters:
            # 첫번째 접두어를 제거하라는 의미
            # browser : http://server.xxxxx.com/user-service/users/signIn
            # inner   : http://server.xxxxx.com/users/signIn
            - StripPrefix=1
          uri: lb://user-service

        - id: product-service
          predicates:
            - Path=/product-service/**
          filters:
            - StripPrefix=1
          uri: lb://product-service

        - id: order-service
          predicates:
            - Path=/order-service/**
          filters:
            - StripPrefix=1
          uri: lb://order-service

jwt:
  secret: ZmFrZS1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LWtleS1sb25nLWVub3VnaA==

# eureka client user service -> eureka server
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
