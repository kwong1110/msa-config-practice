spring:
  cloud:
    gateway:
      # NOTE cors 처리
      # 각 서비스 모듈은 웹브라우저와 직접 통신하지 않으므로 단일진입점인 gateway 담당
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders: "*"
            allowCredentials: true

      # NOTE K8s Service DNS로 라우팅 (Eureka 없이 http:// 직접 사용)
      routes:
        - id: user-service
          predicates:
            - Path=/user-service/**
          filters:
            # 첫번째 접두어를 제거하라는 의미
            # browser : http://server.xxxxx.com/user-service/users/signIn
            # inner   : http://server.xxxxx.com/users/signIn
            - StripPrefix=1
          uri: http://user-service

        - id: product-service
          predicates:
            - Path=/product-service/**
          filters:
            - StripPrefix=1
          uri: http://product-service

        - id: order-service
          predicates:
            - Path=/order-service/**
          filters:
            - StripPrefix=1
          uri: http://order-service

jwt:
  secret: ZmFrZS1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LWtleS1sb25nLWVub3VnaA==
